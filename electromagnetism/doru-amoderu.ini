import numpy as np
import matplotlib.pyplot as plt

# 定数設定
c = 3.0e8  # 光速 [m/s]
tau = 3.0e-14  # 緩和時間 [s]
omega_p = 1.0e15  # プラズマ周波数 [rad/s (or s^-1)]
# ※問題文の10^15 sec^-1は通常rad/sとして扱います

# 波長範囲 (10nm 〜 3000nm)
wavelength_nm = np.linspace(10, 3000, 1000)
wavelength_m = wavelength_nm * 1.0e-9

# 角周波数 omega
omega = 2 * np.pi * c / wavelength_m

# 複素誘電率 epsilon(omega) - Drude Model
# epsilon = 1 - omega_p^2 / (omega * (omega + 1j / tau))
epsilon = 1 - (omega_p**2) / (omega * (omega + 1j / tau))

# 複素屈折率 N = sqrt(epsilon)
# numpyのsqrtは複素数に対応しており、適切な分岐(実部>0)を選びます
N = np.sqrt(epsilon)

# 反射率 R = |(1-N)/(1+N)|^2
R = np.abs((1 - N) / (1 + N))**2

# プロット
plt.figure(figsize=(10, 6))
plt.plot(wavelength_nm, R, label='Reflectivity of Copper (Drude Model)', color='#b87333') # 銅色

# プラズマ波長（参考）
lambda_p_nm = (2 * np.pi * c / omega_p) * 1e9
plt.axvline(x=lambda_p_nm, color='k', linestyle='--', alpha=0.5, label=f'Plasma Wavelength ~{lambda_p_nm:.0f} nm')

plt.xscale('log') # 広範囲なので対数が見やすい場合がありますが、今回は線形でもOK
plt.xlabel('Wavelength (nm)', fontsize=12)
plt.ylabel('Reflectivity R', fontsize=12)
plt.title('Reflectivity of Copper vs Wavelength', fontsize=14)
plt.grid(True, which="both", ls="-", alpha=0.5)
plt.legend()
plt.ylim(0, 1.05)

plt.show()